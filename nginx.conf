server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Security headers (CSP is also set in HTML as <meta>)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Long-cache static assets
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location ~* \.(?:css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # HTML: short cache
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Serve sitemap/robots directly
    location = /robots.txt  { add_header Content-Type "text/plain"; }
    location = /sitemap.xml { add_header Content-Type "application/xml"; }

    # SPA-ish fallback (keeps 404 behavior for missing assets)
    location / {
        try_files $uri $uri/ =404;
    }

    # Block sensitive files
    location ~ /\. { deny all; }
    location ~ \.bak$ { deny all; }
}
